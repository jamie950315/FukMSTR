features:
  depth_levels: [1, 3, 5]
  trade_windows_sec: [1.0, 5.0]
  add_lagged_features: true
  ewm_span: 12
  add_order_flow_features: true
  add_depth_shape_features: true
  add_multi_level_microprice: true
  temporal_windows_rows: [2, 5, 10]
labels:
  horizon_sec: 10.0
  threshold_bps: 1.0
split:
  train_ratio: 0.70
model:
  type: extra_trees
  random_state: 42
  max_iter: 120
  quantile_clip: [0.01, 0.99]
backtest:
  cost_bps: 1.5
  signal_edge_threshold: 0.5
io:
  timestamp_col: timestamp
